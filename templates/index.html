<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeChat-Guard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="shell">
    <section class="panel chat-panel">
      <header>
        <h1>SafeChat-Guard</h1>
        <p>中文对话输入/输出违规内容过滤系统</p>
      </header>
      <div id="messages" class="messages"></div>
      <form id="chat-form" class="composer">
        <textarea id="message" rows="4" placeholder="输入一段测试文本"></textarea>
        <button type="submit">发送并检测</button>
      </form>
    </section>
    <aside class="panel side-panel">
      <h2>检测结果</h2>
      <pre id="result">等待输入...</pre>
      <h2>统计</h2>
      <pre id="stats">加载中...</pre>
    </aside>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
