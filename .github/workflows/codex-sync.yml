name: One-time SafeChat-Guard frontend sync

on:
  push:
    paths:
      - ".github/workflows/codex-sync.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply verified project snapshot
        shell: python
        run: |
          import base64
          import io
          import tarfile
          from pathlib import Path

          payload = ""
          root = Path.cwd().resolve()
          with tarfile.open(fileobj=io.BytesIO(base64.b64decode(payload)), mode="r:gz") as archive:
              for member in archive.getmembers():
                  target = (root / member.name).resolve()
                  if target != root and root not in target.parents:
                      raise RuntimeError(f"Unsafe archive path: {member.name}")
              archive.extractall(root)

          workflow = root / ".github" / "workflows" / "codex-sync.yml"
          workflow.unlink()

      - name: Commit integrated frontend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate D frontend with real safety pipeline"
          git push
